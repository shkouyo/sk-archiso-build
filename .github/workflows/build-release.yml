name: Build and Release ArchISO

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: Release type to publish
        required: true
        default: preview
        type: choice
        options:
          - preview
          - release
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      options: --privileged

    env:
      ARCHISO_SOURCE_REPO: https://codeberg.org/shkouyo/sk-archiso.git
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm archiso git github-cli

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            release_mode="release"
          else
            release_mode="${{ github.event.inputs.release_mode || 'preview' }}"
          fi

          if [[ "${release_mode}" == "preview" ]]; then
            timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            unix_ts="$(date -u +%s)"
            release_name="preview-${timestamp}"
            release_tag="preview-${unix_ts}"
            prerelease="true"
          else
            release_date="$(date -u +%Y-%m-%d)"
            release_name="${release_date}"
            release_tag="release-${release_date}"
            prerelease="false"
          fi

          {
            echo "release_mode=${release_mode}"
            echo "release_name=${release_name}"
            echo "release_tag=${release_tag}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build ArchISO
        id: build
        shell: bash
        run: |
          set -euo pipefail

          temp_root="$(mktemp -d "${RUNNER_TEMP%/}/sk-archiso.XXXXXX")"
          config_dir="${temp_root}/sk-archiso"
          out_dir="${temp_root}/out"
          work_dir="${temp_root}/work"

          echo "Using temp root: ${temp_root}"
          git clone --depth 1 --branch main "${ARCHISO_SOURCE_REPO}" "${config_dir}"

          if [[ ! -d "${config_dir}" ]]; then
            echo "Unable to locate cloned sk-archiso directory" >&2
            exit 1
          fi

          mkarchiso -v -o "${out_dir}" -w "${work_dir}" "${config_dir}"

          if [[ ! -d "${out_dir}" ]]; then
            echo "mkarchiso did not create output directory" >&2
            exit 1
          fi

          if ! find "${out_dir}" -type f -print -quit | grep -q .; then
            echo "No build artifacts found in output directory" >&2
            exit 1
          fi

          echo "out_dir=${out_dir}" >> "${GITHUB_OUTPUT}"

      - name: Publish release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          RELEASE_MODE: ${{ steps.meta.outputs.release_mode }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          OUT_DIR: ${{ steps.build.outputs.out_dir }}
        run: |
          set -euo pipefail

          upload_assets() {
            local tag="$1"
            while IFS= read -r -d '' asset; do
              gh release upload "${tag}" "${asset}" --clobber || return 1
            done < <(find "${OUT_DIR}" -type f -print0 | sort -z)
          }

          upload_assets_with_cleanup() {
            local tag="$1"

            if upload_assets "${tag}"; then
              return 0
            fi

            echo "Asset upload failed; deleting release and tag ${tag}" >&2
            gh release delete "${tag}" --cleanup-tag --yes || true
            return 1
          }

          prepare_release_assets() {
            [[ "${RELEASE_MODE}" == "release" ]] || return 0

            local fixed_iso="${OUT_DIR}/sk_archiso-x86_64.iso"
            local -a source_isos=()
            local iso

            while IFS= read -r -d '' iso; do
              [[ "$(basename "${iso}")" != "sk_archiso-x86_64.iso" ]] || continue
              source_isos+=("${iso}")
            done < <(find "${OUT_DIR}" -type f -name "*.iso" -print0 | sort -z)

            if [[ "${#source_isos[@]}" -eq 0 ]]; then
              if [[ -f "${fixed_iso}" ]]; then
                return 0
              fi

              echo "No source ISO artifact found in ${OUT_DIR}" >&2
              exit 1
            fi

            if [[ "${#source_isos[@]}" -gt 1 ]]; then
              printf 'Expected exactly one source ISO artifact, found %s:\n' "${#source_isos[@]}" >&2
              printf '  %s\n' "${source_isos[@]}" >&2
              exit 1
            fi

            cp -f -- "${source_isos[0]}" "${fixed_iso}"
          }

          prepare_release_assets

          if [[ "${RELEASE_MODE}" == "release" ]] && gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id')"
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -f name="${RELEASE_NAME}" \
              -F prerelease=false \
              -F draft=false \
              --silent

            while IFS= read -r asset_id; do
              [[ -n "${asset_id}" ]] || continue
              gh api \
                --method DELETE \
                "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" \
                --silent
            done < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --jq '.[].id')

            upload_assets "${RELEASE_TAG}"
          else
            create_args=(
              "${RELEASE_TAG}"
              --title "${RELEASE_NAME}"
              --notes ""
            )

            if [[ "${PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease)
            fi

            gh release create "${create_args[@]}"
            upload_assets_with_cleanup "${RELEASE_TAG}"
          fi
